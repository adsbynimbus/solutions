[versions]
android = "8.2.2"
android-jvm = "17"
android-min = "26"
android-sdk = "34"

compose = "1.6.1"
compose-activity = "1.8.2"
compose-compiler = "1.5.9"
compose-multiplatform = "1.6.0-beta02"

kotlin = "1.9.22"
kotlin-coroutines = "1.8.0-RC2"

nimbus = "2.16.0"

[plugins]
android-app = { id = "com.android.application", version.ref = "android" }
android-library = { id = "com.android.library", version.ref = "android" }
compose = { id = "org.jetbrains.compose", version.ref = "compose-multiplatform" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }

[libraries]
compose-activity = { module = "androidx.activity:activity-compose", version.ref = "compose-activity" }
compose-ui = { module = "androidx.compose.ui:ui", version.ref = "compose" }
compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling", version.ref = "compose" }
compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview", version.ref = "compose" }
kotlin-coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlin-coroutines" }
nimbus = { module = "com.adsbynimbus.android:nimbus", version.ref = "nimbus" }
